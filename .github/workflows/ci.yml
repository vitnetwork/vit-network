name: CI

    on:
    push:
      branches: [ main, develop ]
    pull_request:
      branches: [ main ]

    jobs:
    backend-test:
      name: Backend Tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - name: Install dependencies
          run: |
            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            else
              echo "No requirements.txt — skipping backend install"
            fi
        - name: Run tests
          run: |
            if [ -f requirements.txt ] && [ -d tests ]; then
              pytest tests/ -v --tb=short
            else
              echo "No requirements.txt or tests/ — skipping"
            fi
          env:
            VIT_DATABASE_URL: sqlite+aiosqlite:///./test.db
            JWT_SECRET_KEY: test-secret-key-for-ci-only-not-real
            ENVIRONMENT: test

    frontend-build:
      name: Frontend Build
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: '20'
        - name: Install and Build
          run: |
            if [ -d frontend ] && [ -f frontend/package.json ]; then
              cd frontend && npm ci && npm run build
            else
              echo "No frontend/ directory — skipping frontend build"
            fi

    docker-build:
      name: Docker Build Check
      runs-on: ubuntu-latest
      needs: [backend-test, frontend-build]
      if: github.ref == 'refs/heads/main'
      steps:
        - uses: actions/checkout@v4
        - name: Build Docker image
          run: |
            if [ -f Dockerfile ]; then
              docker build -t vit-network:ci .
            else
              echo "No Dockerfile — skipping Docker build check"
            fi
    